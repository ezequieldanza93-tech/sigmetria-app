version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Argentina/Buenos_Aires"
    open-pull-requests-limit: 10
    reviewers:
      - "ezequieldanza93-tech"
    commit-message:
      prefix: "chore(deps):"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
